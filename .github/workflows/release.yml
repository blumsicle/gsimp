name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build darwin arm64 binary
        env:
          CGO_ENABLED: "0"
          GOOS: darwin
          GOARCH: arm64
        run: |
          mkdir -p dist
          go build \
            -ldflags="-X main.name=gsimp -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA::7} -s -w" \
            -o dist/gsimp-darwin-arm64 \
            ./cmd/gsimp

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: dist/gsimp-darwin-arm64
